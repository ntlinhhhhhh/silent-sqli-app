version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: phuzz-db
    command: --general-log=1 --general-log-file=/var/log/mysql/general.log
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: silent_phuzz_db
      MYSQL_USER: phuzz_user
      MYSQL_PASSWORD: phuzz_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-log:/var/log/mysql
      - ./db/install_schema.sql:/docker-entrypoint-initdb.d/install_schema.sql
    restart: always

  web:
    build: .
    container_name: phuzz-php
    entrypoint: ["bash", "-c", "mkdir -p /shared-tmpfs/{coverage-reports,exception-reports,error-reports,mysql-error-reports,mysql-query-events,shell-error-reports,unserialize-error-reports,pathtraversal-error-reports,xxe-error-reports} && find /var/www/html > /shared-tmpfs/web-paths.txt && chmod -R 777 /shared-tmpfs && exec docker-php-entrypoint php-fpm"]

    environment:
      FUZZER_COMPRESS: 1
      FUZZER_COVERAGE_PATH: /var/www/html/

    volumes:
      - ./src:/var/www/html
      - ./mysql-log:/var/log/mysql:ro
      - shared-tmpfs:/shared-tmpfs
      - ./instrumentation:/var/www/fuzzer:ro
    depends_on:
      - db
    restart: always

  nginx:
    image: nginx:alpine
    container_name: phuzz-nginx
    ports:
      - "8888:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
    restart: always



  # Case 7 Base (hargen_001)
  fuzzer-hargen-001-1:
    build:
      context: ../phuzz/silent-phuzz/code/fuzzer
      # context: ../silent_phuzz/silent-phuzz/code/fuzzer
      dockerfile: Dockerfile
    container_name: fuzzer-instance-1
    environment:
      PYTHONUNBUFFERED: 1
      FUZZER_NODE_ID: 1
      FUZZER_CONFIG: hargen_001
      FUZZER_CLEANUP: 1
      FUZZER_COMPRESS: 1
    volumes:
      - ../phuzz/silent-phuzz/code/fuzzer:/app
      # - ../silent_phuzz/silent-phuzz/code/fuzzer:/app
      - shared-tmpfs:/shared-tmpfs
      - sync-tmpfs-hargen_001:/sync-tmpfs
    depends_on:
      - nginx
    restart: always

  # Case 7 Bypass (hargen_002)
  fuzzer-hargen-002-1:
    build:
      context: ../phuzz/silent-phuzz/code/fuzzer
      # context: ../silent_phuzz/silent-phuzz/code/fuzzer
      dockerfile: Dockerfile
    container_name: fuzzer-instance-2
    environment:
      PYTHONUNBUFFERED: 1
      FUZZER_NODE_ID: 2
      FUZZER_CONFIG: hargen_002
      FUZZER_CLEANUP: 1
      FUZZER_COMPRESS: 1
    volumes:
      - ../phuzz/silent-phuzz/code/fuzzer:/app
      # - ../silent_phuzz/silent-phuzz/code/fuzzer:/app
      - shared-tmpfs:/shared-tmpfs
      - sync-tmpfs-hargen_002:/sync-tmpfs
    depends_on:
      - nginx
    restart: always

  # Case 2 Base (hargen_003)
  fuzzer-hargen-003-1:
    build:      
      context: ../phuzz/silent-phuzz/code/fuzzer
      # context: ../silent_phuzz/silent-phuzz/code/fuzzer
      dockerfile: Dockerfile
    container_name: fuzzer-instance-3
    environment:
      PYTHONUNBUFFERED: 1
      FUZZER_NODE_ID: 3
      FUZZER_CONFIG: hargen_003
      FUZZER_CLEANUP: 1
      FUZZER_COMPRESS: 1
    volumes:
      - ../phuzz/silent-phuzz/code/fuzzer:/app
      # - ../silent_phuzz/silent-phuzz/code/fuzzer:/app
      - shared-tmpfs:/shared-tmpfs
      - sync-tmpfs-hargen_003:/sync-tmpfs
    depends_on:
      - nginx
    restart: always

  # Case 2 Bypass (hargen_004)
  fuzzer-hargen-004-1:
    build:
      context: ../phuzz/silent-phuzz/code/fuzzer
      # context: ../silent_phuzz/silent-phuzz/code/fuzzer
      dockerfile: Dockerfile
    container_name: fuzzer-instance-4
    environment:
      PYTHONUNBUFFERED: 1
      FUZZER_NODE_ID: 4
      FUZZER_CONFIG: hargen_004
      FUZZER_CLEANUP: 1
      FUZZER_COMPRESS: 1
    volumes:
      - ../phuzz/silent-phuzz/code/fuzzer:/app
      # - ../silent_phuzz/silent-phuzz/code/fuzzer:/app
      - shared-tmpfs:/shared-tmpfs
      - sync-tmpfs-hargen_004:/sync-tmpfs
    depends_on:
      - nginx
    restart: always

volumes:
  mysql-data:
  shared-tmpfs:
    driver: local
    driver_opts:
      type: "tmpfs"
      device: "tmpfs"
      o: "size=1024m,uid=1000"

  sync-tmpfs-hargen_001:
    driver: local
    driver_opts:
      type: "tmpfs"
      device: "tmpfs"
      o: "size=1024m,uid=1000"
  sync-tmpfs-hargen_002:
    driver: local
    driver_opts:
      type: "tmpfs"
      device: "tmpfs"
      o: "size=1024m,uid=1000"
  sync-tmpfs-hargen_003:
    driver: local
    driver_opts:
      type: "tmpfs"
      device: "tmpfs"
      o: "size=1024m,uid=1000"
  sync-tmpfs-hargen_004:
    driver: local
    driver_opts:
      type: "tmpfs"
      device: "tmpfs"
      o: "size=1024m,uid=1000"