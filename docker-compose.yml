version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: phuzz-db
    command: --general-log=1 --general-log-file=/var/log/mysql/general.log
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: silent_phuzz_db
      MYSQL_USER: phuzz_user
      MYSQL_PASSWORD: phuzz_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-log:/var/log/mysql
      - ./db/install_schema.sql:/docker-entrypoint-initdb.d/install_schema.sql
    restart: always

  web:
    build: .
    container_name: phuzz-php
    entrypoint: ["bash", "-c", "mkdir -p /shared-tmpfs/{coverage-reports,exception-reports,error-reports,mysql-error-reports,shell-error-reports,unserialize-error-reports,pathtraversal-error-reports,xxe-error-reports} && find /var/www/html > /shared-tmpfs/web-paths.txt && chmod -R 777 /shared-tmpfs && exec docker-php-entrypoint php-fpm"]

    environment:
      FUZZER_COMPRESS: 1
      FUZZER_COVERAGE_PATH: /var/www/html/

    volumes:
      - ./src:/var/www/html
      - ./mysql-log:/var/log/mysql:ro
      - shared-tmpfs:/shared-tmpfs
      - ./instrumentation:/var/www/fuzzer:ro
    depends_on:
      - db
    restart: always

  nginx:
    image: nginx:alpine
    container_name: phuzz-nginx
    ports:
      - "8888:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
    restart: always

  # Case 1 Bypass (hargen_0002)
  fuzzer-hargen-0002-1:
    build:
      context: ../silent_phuzz/silent-phuzz/code/fuzzer
      dockerfile: Dockerfile
    container_name: fuzzer-instance-2
    environment:
      PYTHONUNBUFFERED: 1
      FUZZER_NODE_ID: 2
      FUZZER_CONFIG: webapp/hargen_0002
      FUZZER_CLEANUP: 1
      FUZZER_COMPRESS: 1
    volumes:
      - ../silent_phuzz/silent-phuzz/code/fuzzer:/app
      - ../silent_phuzz/silent-phuzz/code/configs:/app/configs
      - shared-tmpfs:/shared-tmpfs
      - sync-tmpfs-hargen_0002:/sync-tmpfs
    depends_on:
      - nginx
    restart: always

  # Case 2 Bypass (hargen_0004)
  fuzzer-hargen-0004-1:
    build:
      context: ../silent_phuzz/silent-phuzz/code/fuzzer
      dockerfile: Dockerfile
